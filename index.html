<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StoneHo Dashboard</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: system-ui, -apple-system, sans-serif;
}

/* DASHBOARD STRIP */
.grid {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 120px;
  padding: 0 40px;
  box-sizing: border-box;
}

/* cards */
.card {
  text-align: center;
  flex: 1;
  white-space: nowrap; /* prevent breaking */
}

/* 🔥 TITLES (fixed as requested) */
.label {
  font-size: 16px;
  font-weight: 700;   /* 👈 bold */
  color: #ffffff;     /* 👈 pure white */
  margin-bottom: 2px;
}

/* values */
.value {
  font-size: 36px;
  font-weight: 600;
  line-height: 1;
}

/* units */
.unit {
  font-size: 14px;
  margin-left: 3px;
}

/* last update */
.updated {
  margin-top: 2px;
  font-size: 10px;
  color: #ffffff;     /* 👈 make readable */
  opacity: 0.75;
}

/* 📱 MOBILE (keep same layout, just scale down) */
@media (max-width: 600px) {
  .grid {
    padding: 0 10px;
  }

  .label {
    font-size: 12px;
  }

  .value {
    font-size: 26px;
  }

  .unit {
    font-size: 11px;
  }

  .updated {
    font-size: 9px;
  }
}
</style>
</head>

<body>

<div class="grid">
  <div class="card">
    <div class="label">StoneHoGround</div>
    <div class="value" id="ground">--</div>
  </div>

  <div class="card">
    <div class="label">StoneHoUpper</div>
    <div class="value" id="upper">--</div>
    <div class="updated" id="updated">--</div>
  </div>

  <div class="card">
    <div class="label">Humidity</div>
    <div class="value" id="humidity">--</div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js'

const SUPABASE_URL = 'https://lkeyypslhuqzurpbpjwi.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrZXl5cHNsaHVxenVycGJwandpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDk1NzksImV4cCI6MjA5MTkyNTU3OX0.ZdmEQILv2qg2dTnkbRuMvcXTl5M-py5KvgINt9Modus'

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

const MODULES = {
  ground: 'StoneHoGround',
  upper: 'StoneHoUpper'
}

window.addEventListener('DOMContentLoaded', () => {
  load()
  setInterval(load, 60000)
})

async function load() {
  const { data, error } = await supabase
    .from('netatmo_measurements')
    .select('module_name, temperature, humidity, time')
    .in('module_name', [MODULES.ground, MODULES.upper])
    .order('time', { ascending: false })
    .limit(100)

  if (error) {
    console.error('Supabase error:', error)
    return
  }

  const latest = {}

  for (const row of data) {
    const name = row.module_name || ''
    if (!latest[name]) {
      latest[name] = row
    }
  }

  const ground = latest[MODULES.ground]
  const upper = latest[MODULES.upper]

  // values
  setValue('ground', ground ? ground.temperature : null, '°C')
  setValue('upper', upper ? upper.temperature : null, '°C')
  setValue('humidity', ground ? ground.humidity : null, '%')

  // last updated (fallback to ground if upper missing)
  setUpdated(
    upper && upper.time
      ? upper.time
      : ground && ground.time
  )
}

function setValue(id, value, unit) {
  const el = document.getElementById(id)
  if (!el) return

  if (value === undefined || value === null) {
    el.innerText = '--'
    return
  }

  el.innerHTML = `
    ${Number(value).toFixed(1)}
    <span class="unit">${unit}</span>
  `
}

function setUpdated(ts) {
  const el = document.getElementById('updated')
  if (!el) return

  if (!ts) {
    el.innerText = '--'
    return
  }

  el.innerText = `Last update ${formatTime(ts)}`
}

function formatTime(ts) {
  const d = new Date(ts)
  return d.toLocaleTimeString('sk-SK', {
    hour: '2-digit',
    minute: '2-digit'
  })
}
</script>

</body>
</html>
