<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StoneHo Dashboard</title>

<style>
  body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: system-ui, -apple-system, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.grid {
  display: flex;
  gap: 80px;
  align-items: center;
  text-align: center;
}

/* cards */
.card {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* labels */
.label {
  font-size: clamp(14px, 2vw, 18px);
  color: #fff;
  margin-bottom: 6px;
}

/* values */
.value {
  font-size: clamp(36px, 6vw, 56px);
  font-weight: 600;
  display: flex;
  align-items: baseline;
  gap: 6px;
}

/* units */
.unit {
  font-size: clamp(14px, 2.5vw, 18px);
  opacity: 0.9;
}

/* last update */
.updated {
  margin-top: 6px;
  font-size: clamp(11px, 2vw, 13px);
  color: #fff;
  opacity: 0.75;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
  .grid {
    flex-direction: column;
    gap: 30px;
  }

  .card {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="grid">
  <div class="card">
    <div class="label">StoneHoGround</div>
    <div class="value" id="ground">--</div>
  </div>

  <div class="card">
    <div class="label">StoneHoUpper</div>
    <div class="value" id="upper">--</div>
    <div class="updated" id="updated">--</div>
  </div>

  <div class="card">
    <div class="label">Humidity</div>
    <div class="value" id="humidity">--</div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js'

const SUPABASE_URL = 'https://lkeyypslhuqzurpbpjwi.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrZXl5cHNsaHVxenVycGJwandpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDk1NzksImV4cCI6MjA5MTkyNTU3OX0.ZdmEQILv2qg2dTnkbRuMvcXTl5M-py5KvgINt9Modus'

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

const MODULES = {
  ground: 'StoneHoGround',
  upper: 'StoneHoUpper'
}

window.addEventListener('DOMContentLoaded', () => {
  load()
  setInterval(load, 60000)
})

async function load() {
  const { data, error } = await supabase
    .from('netatmo_measurements')
    .select('module_name, temperature, humidity, time')
    .in('module_name', [MODULES.ground, MODULES.upper])
    .order('time', { ascending: false })
    .limit(100)

  if (error) {
    console.error('Supabase error:', error)
    return
  }

  const latest = {}

  for (const row of data) {
    const name = row.module_name || ''
    if (!latest[name]) {
      latest[name] = row
    }
  }

  const ground = latest[MODULES.ground]
  const upper = latest[MODULES.upper]

  // values
  setValue('ground', ground ? ground.temperature : null, '°C')
  setValue('upper', upper ? upper.temperature : null, '°C')
  setValue('humidity', ground ? ground.humidity : null, '%')

  // last updated (fallback to ground if upper missing)
  setUpdated(
    upper && upper.time
      ? upper.time
      : ground && ground.time
  )
}

function setValue(id, value, unit) {
  const el = document.getElementById(id)
  if (!el) return

  if (value === undefined || value === null) {
    el.innerText = '--'
    return
  }

  el.innerHTML = `
    ${Number(value).toFixed(1)}
    <span class="unit">${unit}</span>
  `
}

function setUpdated(ts) {
  const el = document.getElementById('updated')
  if (!el) return

  if (!ts) {
    el.innerText = '--'
    return
  }

  el.innerText = `Last update ${formatTime(ts)}`
}

function formatTime(ts) {
  const d = new Date(ts)
  return d.toLocaleTimeString('sk-SK', {
    hour: '2-digit',
    minute: '2-digit'
  })
}
</script>

</body>
</html>
